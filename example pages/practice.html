<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>  
<form action="" method="post">
    <div class="formin-line">
        <div class="formfield">
            <label for="fname">First Name:</label>
            <input type="text" class="fname" id="fname">
        </div>  

        <div>
            <label for="lname">Last Name:</label>
            <input type="text" class="lname" id="lname">
        </div>
    </div>

    <div class="formin-line">
        <div class="formfield">
            <label for="dob">Date of birth:</label>
            <input type="date" class="dob" id="dob">
        </div>

        <div class="formfield">
            <label for="age">Age:</label>
            <input type="number" class="age" id="age">
        </div>
    </div>   

    <div class="formin-line">
        <div class="formfield">
            <label for="gender">Gender:</label>
            <select name="gender" id="gender">
                <option value="">Select gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="formfield">
            <label for="email">Email:</label>
            <input type="email" class="email" id="email" placeholder="enter email address" required>
        </div>
    </div>  

    <div class="formfield">
        <label for="">Positions Available:</label>
        <input type="radio" name="positions" id="positions">
        <label for="jd">Junior Developer</label>
        <input type="radio" name="positions" id="jd">
        <label for="md">Mid-Level Developer</label>
        <input type="radio" name="positions" id="md">
        <label for="sd">Senior Developer</label>
    </div>

    <div class="formfield">
        <label for="">Programming Languages:</label>
        <input type="checkbox" name="languages" id="languages">
        <label for="java">Java</label>
        <input type="checkbox" name="languages" id="java">
        <label for="javascript">Javascript</label>
        <input type="checkbox" name="languages" id="javascript">
        <label for="pyhton">Python</label>
    </div>

    <div class="formin-line">
        <div class="formfield">
            <label for="password">Password:</label>
            <input type="password" name="password" id="password">
        </div>

        <div class="formfield">
            <label for="confirm">Confirm Password:</label>
            <input type="password" class="confirm" id="confirm">
        </div>
    </div> 
    
    <div class="formin-line">
        <div class="formfield">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>
    </div>
</form>
</body>
</html>
